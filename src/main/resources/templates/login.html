<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-wrap {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(0,0,0,0.18);
        }

        .login-top {
            background: #111827;
            color: white;
            padding: 32px;
            text-align: center;
        }

        .login-top h1 {
            font-size: 2.3rem;
            margin: 0;
            font-weight: 700;
        }

        .login-top p {
            margin: 10px 0 0;
            color: #d1d5db;
        }

        .login-body {
            padding: 32px;
        }

        .btn-login {
            background: #f59e0b;
            border: none;
            color: #111827;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
        }

        .btn-login:hover {
            background: #d97706;
            color: white;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-top">
        <h1>BasketHub</h1>
        <p>Acceso al panel profesional de gestión</p>
    </div>

    <div class="login-body">
        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Has cerrado sesión correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control form-control-lg" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login btn-lg">Entrar</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none">Volver al inicio</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

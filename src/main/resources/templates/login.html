<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 18px;
            overflow: hidden;
        }

        .login-header {
            background: #111827;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .login-body {
            background: white;
            padding: 30px;
        }

        .btn-login {
            background: #f4b400;
            border: none;
            color: #111827;
            font-weight: 600;
        }

        .btn-login:hover {
            background: #dea300;
        }
    </style>
</head>
<body>

<div class="card shadow login-card">
    <div class="login-header">
        <h1>BasketHub</h1>
        <p class="mb-0 mt-2">Acceso a la plataforma de gestión de baloncesto</p>
    </div>

    <div class="login-body">
        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Has cerrado sesión correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login btn-lg">Entrar</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">Volver al inicio</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

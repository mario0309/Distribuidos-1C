<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Equipos - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Equipos</h1>
        <div>
            <a href="/teams/new" class="btn btn-primary">Nuevo equipo</a>
            <a href="/" class="btn btn-secondary">Volver al inicio</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(teams)}" class="alert alert-info mb-0">
                No hay equipos registrados todavía.
            </div>

            <table th:if="${!#lists.isEmpty(teams)}" class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Ciudad</th>
                    <th>Entrenador</th>
                    <th>Fecha fundación</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="team : ${teams}">
                    <td th:text="${team.id}"></td>
                    <td th:text="${team.nombre}"></td>
                    <td th:text="${team.ciudad}"></td>
                    <td th:text="${team.entrenador}"></td>
                    <td th:text="${team.fechaFundacion}"></td>
                    <td>
                        <a th:href="@{/teams/edit/{id}(id=${team.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/teams/delete/{id}(id=${team.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que quieres borrar este equipo?')">
                            Borrar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Equipos - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: appLayout('Equipos', ~{::section})}">
    <section>
        <div class="panel-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="h3 mb-1">Listado de equipos</h2>
                    <p class="text-muted mb-0">Consulta y administración de equipos registrados.</p>
                </div>
                <a sec:authorize="hasAnyRole('ADMIN','MANAGER')" href="/teams/new" class="btn btn-primary">Nuevo equipo</a>
            </div>

            <div th:if="${#lists.isEmpty(teams)}" class="alert alert-info mb-0">
                No hay equipos registrados todavía.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(teams)}">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Ciudad</th>
                        <th>Entrenador</th>
                        <th>Fecha fundación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="team : ${teams}">
                        <td th:text="${team.id}"></td>
                        <td class="fw-semibold" th:text="${team.nombre}"></td>
                        <td th:text="${team.ciudad}"></td>
                        <td th:text="${team.entrenador}"></td>
                        <td th:text="${team.fechaFundacion}"></td>

                        <td sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                            <div class="d-flex gap-2">
                                <a th:href="@{/teams/edit/{id}(id=${team.id})}" class="btn btn-sm btn-outline-warning">Editar</a>
                                <a th:href="@{/teams/delete/{id}(id=${team.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Seguro que quieres borrar este equipo?')">Borrar</a>
                            </div>
                        </td>

                        <td sec:authorize="hasRole('PLAYER')">
                            <span class="badge text-bg-secondary">Solo lectura</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

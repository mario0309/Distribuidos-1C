<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Equipo - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: appLayout(${team.id == null} ? 'Crear equipo' : 'Editar equipo', ~{::section})}">
    <section>
        <div class="panel-card p-4" style="max-width: 860px;">
            <h2 class="h3 mb-4" th:text="${team.id == null} ? 'Nuevo equipo' : 'Editar equipo'"></h2>

            <form th:action="@{/teams/save}" th:object="${team}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ciudad</label>
                        <input type="text" th:field="*{ciudad}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Entrenador</label>
                        <input type="text" th:field="*{entrenador}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Fecha de fundación</label>
                        <input type="date" th:field="*{fechaFundacion}" class="form-control" />
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/teams" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

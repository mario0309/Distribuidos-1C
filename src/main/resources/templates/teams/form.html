<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Equipo - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 th:text="${team.id == null} ? 'Crear equipo' : 'Editar equipo'">Equipo</h1>

    <form th:action="@{/teams/save}" th:object="${team}" method="post" class="mt-4">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Ciudad</label>
            <input type="text" th:field="*{ciudad}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Entrenador</label>
            <input type="text" th:field="*{entrenador}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de fundación</label>
            <input type="date" th:field="*{fechaFundacion}" class="form-control" />
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/teams" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>

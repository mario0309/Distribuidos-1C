<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso denegado - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1b263b, #415a77, #778da9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            max-width: 600px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .error-header {
            background: #111827;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .error-body {
            background: white;
            padding: 32px;
            text-align: center;
        }

        .error-code {
            font-size: 4rem;
            font-weight: 700;
            color: #dc3545;
        }
    </style>
</head>
<body>

<div class="card shadow-lg error-card">
    <div class="error-header">
        <h1 class="mb-0">BasketHub</h1>
    </div>

    <div class="error-body">
        <div class="error-code">403</div>
        <h2 class="mb-3">Acceso denegado</h2>
        <p class="text-muted mb-4">
            No tienes permisos para acceder a esta sección de la aplicación.
        </p>

        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a href="/" class="btn btn-dark">Volver al inicio</a>
            <a href="/teams" class="btn btn-outline-secondary">Ir a equipos</a>
            <a href="/players" class="btn btn-outline-secondary">Ir a jugadores</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

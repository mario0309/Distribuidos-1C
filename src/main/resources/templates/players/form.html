<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jugador - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 th:text="${player.id == null} ? 'Crear jugador' : 'Editar jugador'">Jugador</h1>

    <form th:action="@{/players/save}" th:object="${player}" method="post" class="mt-4">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" th:field="*{apellido}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Dorsal</label>
            <input type="number" th:field="*{dorsal}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Posición</label>
            <input type="text" th:field="*{posicion}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Altura</label>
            <input type="number" step="0.01" th:field="*{altura}" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Equipo</label>
            <select th:field="*{team}" class="form-select">
                <option value="">-- Selecciona un equipo --</option>
                <option th:each="team : ${teams}"
                        th:value="${team.id}"
                        th:text="${team.nombre}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/players" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>

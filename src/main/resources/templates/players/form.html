<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jugador - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: appLayout(${player.id == null} ? 'Crear jugador' : 'Editar jugador', ~{::section})">
    <section>
        <div class="panel-card p-4" style="max-width: 980px;">
            <h2 class="h3 mb-4" th:text="${player.id == null} ? 'Nuevo jugador' : 'Editar jugador'"></h2>

            <form th:action="@{/players/save}" th:object="${player}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Apellido</label>
                        <input type="text" th:field="*{apellido}" class="form-control" />
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Dorsal</label>
                        <input type="number" th:field="*{dorsal}" class="form-control" />
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Posición</label>
                        <input type="text" th:field="*{posicion}" class="form-control" />
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Altura</label>
                        <input type="number" step="0.01" th:field="*{altura}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Equipo</label>
                        <select th:field="*{team}" class="form-select">
                            <option value="">-- Selecciona un equipo --</option>
                            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.nombre}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/players" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Jugadores - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: appLayout('Jugadores', ~{::section})}">
    <section>
        <div class="panel-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="h3 mb-1">Listado de jugadores</h2>
                    <p class="text-muted mb-0">Gestión de jugadores y asignación a equipos.</p>
                </div>
                <a sec:authorize="hasAnyRole('ADMIN','MANAGER')" href="/players/new" class="btn btn-primary">Nuevo jugador</a>
            </div>

            <div th:if="${#lists.isEmpty(players)}" class="alert alert-info mb-0">
                No hay jugadores registrados todavía.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(players)}">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Dorsal</th>
                        <th>Posición</th>
                        <th>Altura</th>
                        <th>Equipo</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="player : ${players}">
                        <td th:text="${player.id}"></td>
                        <td class="fw-semibold" th:text="${player.nombre}"></td>
                        <td th:text="${player.apellido}"></td>
                        <td th:text="${player.dorsal}"></td>
                        <td th:text="${player.posicion}"></td>
                        <td th:text="${player.altura}"></td>
                        <td th:text="${player.team != null ? player.team.nombre : 'Sin equipo'}"></td>

                        <td sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                            <div class="d-flex gap-2">
                                <a th:href="@{/players/edit/{id}(id=${player.id})}" class="btn btn-sm btn-outline-warning">Editar</a>
                                <a th:href="@{/players/delete/{id}(id=${player.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Seguro que quieres borrar este jugador?')">Borrar</a>
                            </div>
                        </td>

                        <td sec:authorize="hasRole('PLAYER')">
                            <span class="badge text-bg-secondary">Solo lectura</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

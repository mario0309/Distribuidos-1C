<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jugadores - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Jugadores</h1>
        <div>
            <a href="/players/new" class="btn btn-primary">Nuevo jugador</a>
            <a href="/" class="btn btn-secondary">Volver al inicio</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(players)}" class="alert alert-info mb-0">
                No hay jugadores registrados todavía.
            </div>

            <table th:if="${!#lists.isEmpty(players)}" class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Dorsal</th>
                    <th>Posición</th>
                    <th>Altura</th>
                    <th>Equipo</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="player : ${players}">
                    <td th:text="${player.id}"></td>
                    <td th:text="${player.nombre}"></td>
                    <td th:text="${player.apellido}"></td>
                    <td th:text="${player.dorsal}"></td>
                    <td th:text="${player.posicion}"></td>
                    <td th:text="${player.altura}"></td>
                    <td th:text="${player.team != null ? player.team.nombre : 'Sin equipo'}"></td>
                    <td>
                        <a th:href="@{/players/edit/{id}(id=${player.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/players/delete/{id}(id=${player.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que quieres borrar este jugador?')">
                            Borrar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>

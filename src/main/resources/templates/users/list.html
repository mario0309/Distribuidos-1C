<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: appLayout('Usuarios', ~{::section})}">
    <section>
        <div class="panel-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h2 class="h3 mb-1">Mantenimiento de usuarios</h2>
                    <p class="text-muted mb-0">Administración de usuarios y roles del sistema.</p>
                </div>
                <a href="/users/new" class="btn btn-primary">Nuevo usuario</a>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger">
                <span th:text="${errorMessage}"></span>
            </div>

            <div th:if="${successMessage}" class="alert alert-success">
                <span th:text="${successMessage}"></span>
            </div>

            <div th:if="${#lists.isEmpty(users)}" class="alert alert-info mb-0">
                No hay usuarios registrados todavía.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(users)}">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Nombre</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td class="fw-semibold" th:text="${user.username}"></td>
                        <td th:text="${user.emailuser}"></td>
                        <td th:text="${user.nombreUsuario}"></td>
                        <td th:text="${user.userRole != null ? user.userRole.roleName : 'Sin rol'}"></td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-warning">Editar</a>
                                <a th:href="@{/users/delete/{id}(id=${user.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Seguro que quieres borrar este usuario?')">
                                    Borrar
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

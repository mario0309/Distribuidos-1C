<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Usuarios</h1>
        <div>
            <a href="/users/new" class="btn btn-primary">Nuevo usuario</a>
            <a href="/" class="btn btn-secondary">Volver al inicio</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(users)}" class="alert alert-info mb-0">
                No hay usuarios registrados todavía.
            </div>

            <table th:if="${!#lists.isEmpty(users)}" class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.emailuser}"></td>
                    <td th:text="${user.nombreUsuario}"></td>
                    <td th:text="${user.userRole != null ? user.userRole.roleName : 'Sin rol'}"></td>
                    <td>
                        <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/users/delete/{id}(id=${user.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que quieres borrar este usuario?')">
                            Borrar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

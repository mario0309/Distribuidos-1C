<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuario - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: appLayout(${user.id == null} ? 'Crear usuario' : 'Editar usuario', ~{::section})}">
    <section>
        <div class="panel-card p-4" style="max-width: 980px;">
            <h2 class="h3 mb-4" th:text="${user.id == null} ? 'Nuevo usuario' : 'Editar usuario'"></h2>

            <form th:action="@{/users/save}" th:object="${user}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Username</label>
                        <input type="text" th:field="*{username}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{emailuser}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombreUsuario}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Rol</label>
                        <select th:field="*{userRole}" class="form-select">
                            <option value="">-- Selecciona un rol --</option>
                            <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.roleName}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/users" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mapa - BasketHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .map-shell {
            max-width: 1320px;
            margin: 0 auto;
            padding: 18px 28px 36px 28px;
        }

        .map-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.07);
            margin-bottom: 24px;
        }

        .map-frame {
            width: 100%;
            height: 520px;
            border: 0;
            border-radius: 18px;
        }

        .city-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
            height: 100%;
        }

        .city-card h3 {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .city-card p {
            color: #4b5563;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: appLayout('Mapa', ~{::section})}">
    <section>
        <div class="map-shell">

            <div class="map-card">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                    <div>
                        <h2 class="h3 mb-1">Ubicación de equipos</h2>
                        <p class="text-muted mb-0">
                            Selecciona un equipo para centrar el mapa en su ciudad.
                        </p>
                    </div>
                </div>

                <form method="get" th:action="@{/map}" class="row g-3 mb-4">
                    <div class="col-md-8">
                        <label class="form-label">Equipo</label>
                        <select name="teamId" class="form-select">
                            <option value="">-- Selecciona un equipo --</option>
                            <option th:each="team : ${teams}"
                                    th:value="${team.id}"
                                    th:text="${team.nombre + ' - ' + team.ciudad}"
                                    th:selected="${selectedTeamId != null and selectedTeamId == team.id}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Buscar en mapa</button>
                    </div>
                </form>

                <div th:if="${infoMessage}" class="alert alert-info" th:text="${infoMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <iframe
                        class="map-frame"
                        th:src="${mapUrl}"
                        loading="lazy"
                        allowfullscreen>
                </iframe>
            </div>

            <div class="row g-4" th:if="${selectedTeam != null}">
                <div class="col-md-6">
                    <div class="city-card">
                        <h3 th:text="${selectedTeam.nombre}">Equipo</h3>
                        <p><strong>Ciudad:</strong> <span th:text="${selectedTeam.ciudad}"></span></p>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="city-card">
                        <h3>Información</h3>
                        <p>
                            El mapa se centra automáticamente usando la ciudad guardada en la base de datos.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

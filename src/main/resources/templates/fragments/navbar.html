<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">BasketHub</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">Inicio</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER','PLAYER')">
                    <a class="nav-link" href="/teams">Equipos</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER','PLAYER')">
                    <a class="nav-link" href="/players">Jugadores</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/users">Usuarios</a>
                </li>
            </ul>

            <div class="d-flex gap-2">
                <a sec:authorize="isAnonymous()" href="/login" class="btn btn-outline-light btn-sm">Login</a>

                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-warning btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
